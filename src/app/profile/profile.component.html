<div class="container">

  <!-- Header -->
  <div class="header">
    <h2>{{ 'profile.title' | translate }}</h2>
  </div>

  <div class="content">

    <!-- User Info Card -->
    <section class="user-section">
      <img src="assets/img/girl-profile.jpg" alt="Profile Picture" class="profile-picture">
      <div class="user-info">
        <p class="user-name">{{ userName || ('profile.name_placeholder' | translate) }}</p>
        <p class="user-detail">{{ userEmail || ('profile.email_placeholder' | translate) }}</p>
        <p class="user-detail">{{ phoneNumber || ('profile.mobile_placeholder' | translate) }}</p>
      </div>
      <button class="edit-btn">{{ 'common.edit' | translate }}</button>
    </section>

    <!-- Your Info Menu -->
    <section class="info-section">
      <div class="menu-items">
        <div *ngFor="let item of yourInfoItems; last as isLast">
          <div class="menu-item"
            [class.no-border]="isLast"
            (click)="item.clicked === 'gotoYourOrdersPage' ? gotoYourOrdersPage() :
                     item.clicked === 'gotoAddressBookPage' ? gotoAddressBookPage() :
                     item.clicked === 'gotoCollectedCouponsPage' ? gotoCollectedCouponsPage() : null">
            <mat-icon [svgIcon]="item.icon" [alt]="item.labelKey | translate" class="menu-icon"></mat-icon>
            <span class="menu-label">{{ item.labelKey | translate }}</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Other Info Menu -->
    <section class="info-section">
      <div class="menu-items">
        <div *ngFor="let item of otherInfoItems; last as isLast">
          <div class="menu-item"
            [class.no-border]="isLast"
            (click)="handleClick(item.clicked)">
            <mat-icon [svgIcon]="item.icon" [alt]="item.labelKey | translate" class="menu-icon"></mat-icon>
            <span class="menu-label">{{ item.labelKey | translate }}</span>
          </div>
        </div>
      </div>
    </section>


  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-icons">
      <div class="icon" (click)="changeFooterTab('home'); gotoHomePage()">
            <mat-icon [svgIcon]="activeTab === 'home' ? 'home-icon-active' : 'home-icon'" [alt]="'Home'" style="height: 29px; width: 29px; display: flex;"></mat-icon>
      </div>
      <div class="icon" (click)="changeFooterTab('stores'); gotoShopsPage()">
            <mat-icon [svgIcon]="activeTab === 'stores' ? 'stores-icon-active' : 'stores-icon'" [alt]="'Stores'" style="height: 31px; width: 30px; display: flex;"></mat-icon>
      </div>
      <div class="icon" (click)="changeFooterTab('explore'); gotoExplorePage()">
            <mat-icon [svgIcon]="activeTab === 'explore' ? 'group-icon-active' : 'group-icon'" [alt]="'Explore'" style="height: 25px; width: 24px; display: flex;"></mat-icon>
      </div>
          <!-- <div class="icon" (click)="changeFooterTab('trends')">
            <mat-icon [svgIcon]="activeTab === 'trends' ? 'trends-icon-active' : 'trends-icon'" [alt]="'Trends'" style="height: 21px; width: 28px; display: flex;"></mat-icon>
          </div> -->
          <div class="icon" (click)="changeFooterTab('profile'); scrollToTop();">
             <mat-icon [svgIcon]="activeTab === 'profile' ? 'profile-icon-active' : 'profile-icon'" [alt]="'Profile'" style="height: 28px; width: 28px; display: flex;"></mat-icon>
      </div>
    </div>
  </div>

</div>
